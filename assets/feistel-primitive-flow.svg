<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="650" viewBox="0 0 1560 650" role="img" aria-labelledby="title desc">
  <title>Feistel permutation step</title>
  <desc>Used for both the epoch-local and full-range permutation stages.</desc>
  <defs>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#64748b" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect width="1560" height="650" fill="#ffffff" />
  <text x="780" y="58" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">Feistel permutation step</text>
  <text x="780" y="92" text-anchor="middle" font-size="18" fill="#475569">Used for both the epoch-local and full-range permutation stages.</text>
  
    
    <rect x="220" y="122" width="22" height="22" rx="7" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" />
    <text x="254" y="138" font-size="16" font-weight="600" fill="#475569">Feistel setup</text>
  
    <rect x="470" y="122" width="22" height="22" rx="7" fill="#fde68a" stroke="#b45309" stroke-width="2" />
    <text x="504" y="138" font-size="16" font-weight="600" fill="#475569">Round mixing</text>
  
    <rect x="710" y="122" width="22" height="22" rx="7" fill="#e0f2fe" stroke="#0284c7" stroke-width="2" />
    <text x="744" y="138" font-size="16" font-weight="600" fill="#475569">Decision</text>
  
    <rect x="920" y="122" width="22" height="22" rx="7" fill="#fee2e2" stroke="#dc2626" stroke-width="2" />
    <text x="954" y="138" font-size="16" font-weight="600" fill="#475569">Yes / No</text>
  
    <rect x="1110" y="122" width="22" height="22" rx="7" fill="#dcfce7" stroke="#16a34a" stroke-width="2" />
    <text x="1144" y="138" font-size="16" font-weight="600" fill="#475569">Return</text>
  
    
    <rect x="60" y="210" width="190" height="70" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="155" y="233.5">Start with</tspan><tspan x="155" y="256.5">value x</tspan></text>
  
    
    <rect x="300" y="190" width="280" height="88" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="440" y="211">Choose a near-square</tspan><tspan x="440" y="234">grid a × b that covers</tspan><tspan x="440" y="257">the target range</tspan></text>
  
    
    <rect x="630" y="210" width="210" height="70" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="735" y="233.5">Decode x into</tspan><tspan x="735" y="256.5">l and r</tspan></text>
  
    
    <rect x="890" y="180" width="300" height="102" rx="18" fill="#fde68a" stroke="#b45309" stroke-width="3" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="1040" y="208">For each round, hash with</tspan><tspan x="1040" y="231">the seed and round index,</tspan><tspan x="1040" y="254">then swap and mix the sides</tspan></text>
  
    
    <rect x="1240" y="210" width="200" height="70" rx="18" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2.5" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="1340" y="233.5">Re-encode the</tspan><tspan x="1340" y="256.5">result into x</tspan></text>
  
    
    <polygon points="1260,352 1370,408 1260,464 1150,408" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="1260" y="396.5">Is x inside</tspan><tspan x="1260" y="419.5">the range?</tspan></text>
  
    
    <rect x="1090" y="390" width="60" height="36" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="1120" y="408">No</tspan></text>
  
    
    <rect x="1424" y="390" width="64" height="36" rx="18" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="1456" y="408">Yes</tspan></text>
  
    
    <rect x="1170" y="520" width="180" height="60" rx="18" fill="#dcfce7" stroke="#16a34a" stroke-width="3" filter="url(#shadow)" />
    <text text-anchor="middle" font-size="18" font-weight="600" fill="#0f172a"><tspan x="1260" y="550">Return x</tspan></text>
  
    <text x="150" y="388" font-size="16" font-weight="600" fill="#475569">Cycle-walk if needed</text>
    <path d="M 250 245 L 300 245" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 580 245 L 630 245" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 840 245 L 890 245" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 1190 245 L 1240 245" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 1340 280 L 1340 356 L 1280 356 L 1280 356" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 1260 464 L 1260 520" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 1150 408 L 1080 408" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 1090 408 L 180 408 L 180 280" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 1424 408 L 1450 408" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" /><path d="M 1488 408 L 1488 550 L 1340 550" fill="none" stroke="#64748b" stroke-width="2.75" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrowhead)" />
  
</svg>